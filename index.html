<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Sesiones — ARC</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --rojo:#e8554e; --naranja:#f2994a; --amarillo:#f2c94c;
    --verde:#27ae60; --azul:#2f80ed; --morado:#9b51e0;
    --tinta:#2b2d42; --gris:#6b7280; --linea:#e6e8ef; --fondo:#f4f5f9;
    --por:#9aa0ac; --age:#f2994a; --com:#27ae60;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',system-ui,sans-serif;background:var(--fondo);color:var(--tinta);
    display:flex;justify-content:center;padding:18px 12px 70px;-webkit-font-smoothing:antialiased;}
  .app{width:100%;max-width:460px;}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .logo{width:38px;height:38px;border-radius:10px;flex:none;
    background:linear-gradient(135deg,var(--rojo),var(--naranja),var(--amarillo),var(--verde),var(--azul),var(--morado));}
  .top h1{font-size:18px;font-weight:800;line-height:1.05;}
  .top p{font-size:12px;color:var(--gris);font-weight:600;}

  .banner{background:#fff7e6;border:1px solid #f3d98a;border-radius:10px;padding:9px 12px;
    font-size:11.5px;font-weight:700;color:#92670c;margin-bottom:14px;display:none;}
  .banner.show{display:block;}

  .tabs{display:flex;background:#fff;border:1px solid var(--linea);border-radius:12px;padding:4px;margin-bottom:16px;}
  .tabs button{flex:1;border:0;background:none;font-family:inherit;font-weight:700;font-size:12.5px;color:var(--gris);
    padding:9px 4px;border-radius:9px;cursor:pointer;}
  .tabs button.on{background:var(--tinta);color:#fff;}

  .card{background:#fff;border:1px solid var(--linea);border-radius:16px;padding:16px;margin-bottom:14px;
    box-shadow:0 1px 2px rgba(20,20,50,.04);}
  label.fld{display:block;font-size:12px;font-weight:700;color:var(--gris);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.03em;}
  label.fld:first-child{margin-top:0;}
  select{width:100%;font-family:inherit;font-size:15px;font-weight:600;color:var(--tinta);
    background:#fff;border:1.5px solid var(--linea);border-radius:11px;padding:12px;appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' fill='none' stroke='%236b7280' stroke-width='2'><path d='M5 8l5 5 5-5'/></svg>");
    background-repeat:no-repeat;background-position:right 12px center;}
  select:disabled{background:#f6f7fa;color:#b6bac4;cursor:not-allowed;}
  select:focus{outline:none;border-color:var(--azul);}

  .clsinfo{display:none;background:#f8f9fc;border:1px solid var(--linea);border-radius:13px;padding:13px;margin-top:14px;}
  .clsinfo.show{display:block;}
  .clsinfo .row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;gap:10px;}
  .clsinfo .row span:first-child{color:var(--gris);font-weight:600;white-space:nowrap;}
  .clsinfo .row span:last-child{font-weight:700;text-align:right;}
  .prog{margin-top:10px;}
  .prog .bar{height:9px;border-radius:6px;background:#e9ebf2;overflow:hidden;}
  .prog .bar i{display:block;height:100%;background:var(--verde);border-radius:6px;transition:width .3s;}
  .prog .lbl{font-size:12px;font-weight:700;color:var(--gris);margin-top:6px;}

  .sesiones{display:none;}
  .sesiones.show{display:block;}
  .ses{border:1px solid var(--linea);border-radius:13px;padding:12px;margin-bottom:10px;}
  .ses .hd{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .ses .num{width:26px;height:26px;border-radius:8px;background:var(--tinta);color:#fff;font-weight:800;font-size:13px;
    display:flex;align-items:center;justify-content:center;flex:none;}
  .ses .ti{font-weight:700;font-size:14px;}
  .seg{display:flex;gap:6px;margin-bottom:9px;}
  .seg button{flex:1;border:1.5px solid var(--linea);background:#fff;font-family:inherit;font-weight:700;font-size:11.5px;
    color:var(--gris);padding:8px 4px;border-radius:9px;cursor:pointer;line-height:1.1;}
  .seg button.s-por.on{background:var(--por);border-color:var(--por);color:#fff;}
  .seg button.s-age.on{background:var(--age);border-color:var(--age);color:#fff;}
  .seg button.s-com.on{background:var(--com);border-color:var(--com);color:#fff;}
  .ses input[type=date]{width:100%;font-family:inherit;font-size:14px;font-weight:600;color:var(--tinta);
    border:1.5px solid var(--linea);border-radius:10px;padding:10px 12px;}
  .ses input[type=date]:disabled{background:#f6f7fa;color:#b6bac4;}
  .ses input[type=date]:focus{outline:none;border-color:var(--azul);}

  .actions{display:none;gap:10px;margin-top:4px;}
  .actions.show{display:flex;}
  .btn{flex:1;border:0;font-family:inherit;font-weight:800;font-size:15px;padding:14px;border-radius:13px;cursor:pointer;}
  .btn.save{background:var(--azul);color:#fff;}
  .btn.save:active{transform:translateY(1px);}
  .btn.save:disabled{opacity:.55;}
  .name-wrap{display:none;}
  .name-wrap.show{display:block;}

  .kpis{display:flex;gap:10px;margin-bottom:14px;}
  .kpi{flex:1;background:#fff;border:1px solid var(--linea);border-radius:14px;padding:13px 8px;text-align:center;}
  .kpi b{display:block;font-size:23px;font-weight:800;}
  .kpi span{font-size:10.5px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.02em;}
  .kpi.c-com b{color:var(--com);} .kpi.c-age b{color:var(--age);} .kpi.c-por b{color:var(--por);}

  .dtitle{font-size:13px;font-weight:800;color:var(--gris);text-transform:uppercase;letter-spacing:.03em;margin:4px 0 10px;}
  .grp{margin-bottom:13px;}
  .grp .gh{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:5px;gap:8px;}
  .grp .gh span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .grp .gh span:last-child{color:var(--gris);white-space:nowrap;}
  .stack{height:14px;border-radius:7px;overflow:hidden;display:flex;background:#eef0f5;}
  .stack i{height:100%;}
  .stack .x-com{background:var(--com);} .stack .x-age{background:var(--age);} .stack .x-por{background:var(--por);}
  .legend{display:flex;gap:14px;font-size:12px;font-weight:700;color:var(--gris);margin-top:4px;flex-wrap:wrap;}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:middle;}

  /* school header (Por colegio) */
  .schoolname{font-weight:800;font-size:16px;line-height:1.15;}
  .schoolsub{font-size:12px;color:var(--gris);font-weight:600;margin:2px 0 10px;}
  .ginfo{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:4px 0;border-top:1px solid var(--linea);}
  .ginfo:first-of-type{border-top:0;}
  .ginfo span{color:var(--gris);font-weight:600;white-space:nowrap;}
  .ginfo b{font-weight:700;text-align:right;}

  /* matrix (General) */
  .matrix-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .matrix{border-collapse:collapse;width:100%;font-size:12.5px;}
  .matrix th,.matrix td{border:1px solid var(--linea);padding:6px 8px;text-align:center;white-space:nowrap;}
  .matrix th{background:#f6f7fa;font-weight:800;color:var(--gris);font-size:11px;position:sticky;top:0;}
  .matrix th.lcol,.matrix td.lcol{text-align:left;}
  .matrix td.lcol{white-space:normal;min-width:150px;max-width:225px;vertical-align:top;}
  .matrix td.lcol .cn{display:block;font-weight:700;font-size:12.5px;color:var(--tinta);line-height:1.2;}
  .matrix td.lcol .eq{display:block;font-size:10px;color:var(--gris);font-weight:700;margin:2px 0 4px;}
  .matrix td.lcol .adates{font-size:9.5px;color:var(--gris);font-weight:600;line-height:1.6;white-space:normal;}
  .matrix td.lcol .adates b{color:var(--tinta);font-weight:800;margin-right:3px;}
  .matrix td.lcol .adates .dd2{color:#1f9d57;font-weight:700;}
  .matrix td.lcol .adates .dd1{color:#d98613;font-weight:700;}
  .matrix td.lcol .adates .dd0{color:#c2c6cf;font-weight:600;}
  .matrix td.m4{background:#eaf7ef;color:var(--com);font-weight:800;}
  .matrix td.mp{background:#fdf1e3;color:#b9750f;font-weight:800;}
  .matrix td.m0{background:#f6f7fa;color:var(--gris);font-weight:700;}
  .matrix td.x{color:#c7ccd6;}
  .matrix tr.locrow td{background:#eaedf3;color:var(--tinta);font-weight:800;text-align:left;
    font-size:11px;text-transform:uppercase;letter-spacing:.04em;position:sticky;left:0;}

  .aula-card{border:1px solid var(--linea);border-radius:14px;padding:13px;margin-bottom:11px;}
  .aula-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;gap:8px;}
  .aula-hd .nm{font-weight:800;font-size:15px;}
  .aula-hd .pc{font-weight:800;font-size:14px;color:var(--verde);white-space:nowrap;}
  .aula-sub{font-size:12px;color:var(--gris);font-weight:600;margin-bottom:10px;}
  .cells{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
  .cell{border-radius:9px;padding:7px 2px 6px;text-align:center;border:1.5px solid var(--linea);background:#fff;}
  .cell.e2{background:#eaf7ef;border-color:#bfe6cd;}
  .cell.e1{background:#fdf1e3;border-color:#f6dcbc;}
  .cell.e0{background:#f6f7fa;border-color:var(--linea);}
  .cell .sn{font-size:11px;font-weight:800;color:var(--gris);}
  .cell .dot{width:9px;height:9px;border-radius:50%;margin:4px auto;}
  .cell.e2 .dot{background:var(--com);} .cell.e1 .dot{background:var(--age);} .cell.e0 .dot{background:var(--por);}
  .cell .dt{font-size:9.5px;font-weight:700;color:var(--gris);line-height:1.1;}

  .alert{background:#fff5f4;border:1px solid #f6cfcc;border-radius:13px;padding:13px;}
  .alert .ah{font-weight:800;color:var(--rojo);font-size:13px;margin-bottom:8px;}
  .alert .ai{font-size:13px;font-weight:600;padding:5px 0;border-top:1px dashed #f0d2cf;}
  .alert .ai:first-of-type{border-top:0;}
  .alert .ai b{color:var(--tinta);}
  .alert .none{font-size:13px;color:var(--gris);font-weight:600;}

  .hide{display:none;}
  .muted{font-size:13px;color:var(--gris);font-weight:600;text-align:center;padding:20px 0;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--tinta);color:#fff;font-weight:700;font-size:14px;padding:13px 20px;border-radius:12px;
    opacity:0;pointer-events:none;transition:.25s;z-index:9;text-align:center;max-width:90%;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="logo"></div>
    <div><h1>Seguimiento de Sesiones</h1><p>Aulas en Re-Conexión · ARC</p></div>
  </div>
  <div class="banner" id="banner"></div>

  <div class="tabs">
    <button id="tab-reg" class="on" onclick="setTab('reg')">Registrar Acción</button>
    <button id="tab-col" onclick="setTab('col')">Por colegio</button>
    <button id="tab-gen" onclick="setTab('gen')">Por equipo</button>
  </div>

  <!-- REGISTRAR -->
  <div id="view-reg">
    <div class="card">
      <label class="fld">Localidad</label>
      <select id="sel-loc" onchange="onLoc()"></select>
      <label class="fld">Colegio</label>
      <select id="sel-col" disabled onchange="onCol()"></select>
      <label class="fld">Aula</label>
      <select id="sel-aula" disabled onchange="onAula()"></select>
      <div id="clsinfo" class="clsinfo">
        <div class="row"><span>Clase / curso</span><span id="i-cur"></span></div>
        <div class="row"><span>Gestor(a)</span><span id="i-ges"></span></div>
        <div class="row"><span>Estudiantes</span><span id="i-est"></span></div>
        <div class="row"><span>Contacto</span><span id="i-con"></span></div>
        <div class="prog"><div class="bar"><i id="i-bar"></i></div><div class="lbl" id="i-lbl"></div></div>
      </div>
    </div>
    <div id="sesiones" class="sesiones"></div>
    <div class="card name-wrap" id="namewrap">
      <label class="fld">¿Quién registra?</label>
      <select id="reg-name"></select>
    </div>
    <div class="actions" id="actions">
      <button class="btn save" id="btn-save" onclick="save()">Guardar cambios</button>
    </div>
  </div>

  <!-- POR COLEGIO -->
  <div id="view-col" class="hide">
    <div class="card">
      <label class="fld">Localidad</label>
      <select id="dsel-loc" onchange="onDashLoc()"></select>
      <label class="fld">Colegio</label>
      <select id="dsel-col" disabled onchange="renderColegio()"></select>
    </div>
    <div id="col-body"></div>
  </div>

  <!-- GENERAL -->
  <div id="view-gen" class="hide">
    <div class="card">
      <label class="fld">Filtrar por equipo</label>
      <select id="gen-eq" onchange="onGenEquipo()"></select>
      <label class="fld">Filtrar por gestor(es)</label>
      <select id="gen-ges" onchange="renderGen()"></select>
    </div>
    <div class="kpis">
      <div class="kpi c-com"><b id="k-com">0</b><span>Completadas</span></div>
      <div class="kpi c-age"><b id="k-age">0</b><span>Agendadas</span></div>
      <div class="kpi c-por"><b id="k-por">0</b><span>Por agendar</span></div>
    </div>
    <div class="card">
      <div class="dtitle">Sesiones completadas · colegio × aula</div>
      <div class="matrix-wrap"><table id="gen-matrix" class="matrix"></table></div>
      <div class="legend">
        <span><i style="background:#27ae60"></i>4/4</span>
        <span><i style="background:#f2c98a"></i>parcial</span>
        <span><i style="background:#dfe3ea"></i>sin iniciar</span>
        <span>— = sin aula</span>
      </div>
      <div class="legend" style="margin-top:4px;">
        <span>Fechas:</span>
        <span style="color:#1f9d57">completada</span>
        <span style="color:#d98613">agendada</span>
        <span style="color:#c2c6cf">– sin agendar</span>
      </div>
    </div>
    <div class="alert" id="gen-alert"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   CONFIGURACIÓN — pega aquí las URLs cuando tengas la hoja publicada.
   Si quedan vacías, la página corre en MODO DEMO con datos de ejemplo.
   ===================================================================== */
const CONFIG = {
  // Pega aquí la URL /exec de tu app web (Apps Script). Una sola URL para leer y guardar.
  // Si queda vacía, la página corre en MODO DEMO con datos de ejemplo.
  APPS_URL: "https://script.google.com/macros/s/AKfycbxVytGYPYqdloofGCSdKmaAzs89HfHUPxpaShuA82ZW0KO91gPHQ1S49GToLgzjhFWZ/exec"
};

const NSES = 4;   // sesiones 1..4 (sin sesión 0). El índice 0 del arreglo = Sesión 1.
const ESTADO_TXT = ["Por agendar","Agendada","Completada"];
const HOY = new Date().toISOString().slice(0,10);

/* ---- datos DEMO (se usan solo si CONFIG está vacío) ---- */
const DEMO = [
  {id:"D1", ges:"Camila", cod:"S046", loc:"Antonio Nariño", col:"Normal Superior Distrital María Montessori (IED)", jor:"Única", curso:"804", aula:"Aula 1", est:37, con:"Jesús García",
    ses:[{f:"2026-04-27",e:2},{f:"2026-05-04",e:2},{f:"2026-05-05",e:2},{f:"2026-05-12",e:2}]},
  {id:"D2", ges:"Camila", cod:"S025", loc:"Antonio Nariño", col:"Francisco de Paula Santander (IED)", jor:"Única", curso:"802", aula:"Aula 2", est:26, con:"Isis Ayala",
    ses:[{f:"2026-04-21",e:2},{f:"2026-05-11",e:2},{f:"2026-05-14",e:1},{f:"2026-05-22",e:1}]},
  {id:"D3", ges:"Paula V", loc:"Kennedy", col:"INEM Francisco de Paula Santander (IED)", jor:"Mañana", curso:"901", aula:"Aula 1", est:33, con:"Marta Gómez",
    ses:[{f:"2026-05-04",e:2},{f:"2026-05-11",e:2},{f:"2026-06-02",e:1},{f:"",e:0}]},
  {id:"D4", ges:"Paula V", loc:"Kennedy", col:"INEM Francisco de Paula Santander (IED)", jor:"Tarde", curso:"701", aula:"Aula 2", est:30, con:"Luis Parra",
    ses:[{f:"2026-06-08",e:1},{f:"",e:0},{f:"",e:0},{f:"",e:0}]},
  {id:"D5", ges:"Andrés", loc:"Suba", col:"Gerardo Paredes (IED)", jor:"Mañana", curso:"1001", aula:"Aula 1", est:28, con:"Ana Ríos",
    ses:[{f:"",e:0},{f:"",e:0},{f:"",e:0},{f:"",e:0}]},
];

let CLASES=[];
const $=id=>document.getElementById(id);
const uniq=a=>[...new Set(a)];
const shortCol=s=>String(s||"").replace(/\s*\(IED\)/i,'').replace(/^COLEGIO\s+/i,'').trim();
const estadoNum=t=>{const n=String(t||"").toLowerCase();
  if(n.indexOf("complet")>=0) return 2;          // Completada
  if(n.indexOf("por agend")>=0) return 0;        // Por agendar  (chequear ANTES que "agenda")
  if(n.indexOf("agenda")>=0) return 1;           // Agendada
  return 0;};
function fmtFecha(f){ if(!f) return "—"; const d=new Date(f+"T00:00"); return isNaN(d)?f:d.toLocaleDateString('es-CO',{weekday:'short',day:'numeric',month:'short'}); }
function fmtCorta(f){ if(!f) return "—"; const d=new Date(f+"T00:00"); return isNaN(d)?f:d.toLocaleDateString('es-CO',{day:'numeric',month:'short'}); }
function opt(v,t){ return `<option value="${v}">${(t!=null?t:v)}</option>`; }
function gestores(){ return uniq(CLASES.map(c=>c.ges).filter(Boolean)); }
function aulaLabel(c){ return (c.aula? c.aula+" · ":"")+ (c.curso||""); }

/* ---------- carga de datos ---------- */
function getJson(url){ return fetch(url).then(r=>r.json()); }

async function loadData(){
  if(!CONFIG.APPS_URL){             // modo demo
    CLASES = JSON.parse(JSON.stringify(DEMO));
    $('banner').textContent="Modo demostración · datos de ejemplo. Conecta tu app web en CONFIG para usar datos reales.";
    $('banner').classList.add('show');
    afterLoad(); return;
  }
  try{
    const base=CONFIG.APPS_URL;
    const [cl,se] = await Promise.all([
      getJson(base+(base.indexOf('?')>=0?'&':'?')+"tipo=clases"),
      getJson(base+(base.indexOf('?')>=0?'&':'?')+"tipo=sesiones")
    ]);
    const byId={};
    CLASES = (cl||[]).filter(r=>r.class_id).map(r=>{
      const c={ id:r.class_id, ges:r.gestor, cod:r.codigo_aer, loc:r.localidad, col:r.colegio,
        jor:r.jornada, curso:r.curso, aula:r.aula, est:r.estudiantes, con:r.contacto_colegio,
        rol:r.rol_contacto, cel:r.celular_contacto,
        ses:Array.from({length:NSES},()=>({f:"",e:0})) };
      byId[c.id]=c; return c;
    });
    (se||[]).forEach(r=>{ const c=byId[r.class_id]; const j=parseInt(r.sesion,10)-1;  // sesión 1..4 -> índice 0..3
      if(c && j>=0 && j<NSES){ c.ses[j]={ f:String(r.fecha||"").slice(0,10), e:estadoNum(r.estado) }; }});
    afterLoad();
  }catch(err){
    $('banner').textContent="No se pudo leer la hoja. Revisa la URL en CONFIG. ("+err+")";
    $('banner').classList.add('show');
    CLASES = JSON.parse(JSON.stringify(DEMO)); afterLoad();
  }
}
function teamLabel(c){ return String(c.cod||"").toUpperCase().startsWith("AULAS")
  ? "Aulas con Emoción" : "Promoción y Prevención"; }
function fillGenGes(eq){
  const gs=uniq(CLASES.filter(c=>!eq||teamLabel(c)===eq).map(c=>c.ges).filter(Boolean))
    .sort((a,b)=>a.localeCompare(b,'es'));
  $('gen-ges').innerHTML=opt("","Todos los gestores")+gs.map(g=>opt(g)).join('');
}
function onGenEquipo(){ fillGenGes($('gen-eq').value); renderGen(); }
function afterLoad(){
  fillLoc(); fillDashLoc();
  const gs=gestores().sort((a,b)=>a.localeCompare(b,'es'));
  $('reg-name').innerHTML = opt("","Selecciona…")+gs.map(g=>opt(g)).join('');
  $('gen-eq').innerHTML = opt("","Todos los equipos")+opt("Promoción y Prevención")+opt("Aulas con Emoción");
  fillGenGes("");
  if(!CONFIG.APPS_URL){ $('btn-save').textContent="Guardar (demo)"; }
}

/* ============ REGISTRAR ============ */
let cur=null, draft=null;
function fillLoc(){ const l=uniq(CLASES.map(c=>c.loc)).sort();
  $('sel-loc').innerHTML=opt("","Selecciona…")+l.map(x=>opt(x)).join(''); }
function aulaLabelFull(c){ return [c.aula, c.jor?("Jornada "+c.jor):null, c.curso].filter(Boolean).join(" · "); }
function onLoc(){ const loc=$('sel-loc').value;
  const cols=uniq(CLASES.filter(c=>c.loc===loc).map(c=>c.col)).sort();
  const s=$('sel-col'); s.innerHTML=opt("","Selecciona…")+cols.map(c=>opt(c,shortCol(c))).join(''); s.disabled=!loc;
  $('sel-aula').innerHTML=opt("","—"); $('sel-aula').disabled=true; clearDetail(); }
function onCol(){ const loc=$('sel-loc').value, col=$('sel-col').value;
  const a=CLASES.filter(c=>c.loc===loc&&c.col===col)
    .sort((x,y)=>String(x.aula||"").localeCompare(String(y.aula||""),'es',{numeric:true})||String(x.jor).localeCompare(String(y.jor)));
  const s=$('sel-aula'); s.innerHTML=opt("","Selecciona…")+a.map(c=>opt(c.id,aulaLabelFull(c))).join(''); s.disabled=!col; clearDetail(); }
function clearDetail(){ cur=null; draft=null;
  ['clsinfo','sesiones','namewrap','actions'].forEach(x=>$(x).classList.remove('show')); }
function onAula(){ const id=$('sel-aula').value; cur=CLASES.find(c=>c.id===id)||null;
  if(!cur){ clearDetail(); return; } draft=cur.ses.map(s=>({f:s.f,e:s.e})); renderClase(); }
function renderClase(){
  $('i-cur').textContent=cur.curso||"—"; $('i-ges').textContent=cur.ges||"—";
  $('i-est').textContent=cur.est||"—"; $('i-con').textContent=cur.con||"—";
  $('clsinfo').classList.add('show');
  let html='';
  for(let i=0;i<NSES;i++){ const s=draft[i];
    html+=`<div class="ses"><div class="hd"><div class="num">${i+1}</div><div class="ti">Sesión ${i+1}</div></div>
      <div class="seg">
        <button class="s-por ${s.e===0?'on':''}" onclick="setEstado(${i},0)">Por agendar</button>
        <button class="s-age ${s.e===1?'on':''}" onclick="setEstado(${i},1)">Agendada</button>
        <button class="s-com ${s.e===2?'on':''}" onclick="setEstado(${i},2)">Completada</button>
      </div>
      <input type="date" value="${s.f}" ${s.e===0?'disabled':''} onchange="setFecha(${i},this.value)"></div>`;
  }
  $('sesiones').innerHTML=html; $('sesiones').classList.add('show');
  $('namewrap').classList.add('show'); $('actions').classList.add('show');
  $('reg-name').value = gestores().includes(cur.ges)? cur.ges : "";
  updateProg();
}
function setEstado(i,e){ draft[i].e=e; if(e===0) draft[i].f=""; renderClase(); }
function setFecha(i,v){ draft[i].f=v; }
function updateProg(){ const d=draft.filter(s=>s.e===2).length;
  $('i-bar').style.width=(d/NSES*100)+'%'; $('i-lbl').textContent=`${d}/${NSES} sesiones completadas`; }
function save(){
  const nm=$('reg-name').value;
  if(!nm){ toast("Selecciona quién registra antes de guardar"); $('reg-name').focus(); return; }
  const payload={ class_id:cur.id, updated_by:nm,
    sesiones:draft.map((s,i)=>({sesion:i+1, fecha:s.f, estado:ESTADO_TXT[s.e]})) };
  cur.ses=draft.map(s=>({f:s.f,e:s.e}));     // actualiza en memoria
  if(CONFIG.APPS_URL){
    $('btn-save').disabled=true;
    fetch(CONFIG.APPS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify(payload)})
      .then(()=>{ toast(`Guardado · ${aulaLabel(cur)}`); })
      .catch(()=>{ toast("Guardado local, pero falló el envío. Reintenta."); })
      .finally(()=>{ $('btn-save').disabled=false; });
  } else { toast(`Guardado · ${aulaLabel(cur)} (demo)`); }
}

/* ============ POR COLEGIO ============ */
function fillDashLoc(){ const l=uniq(CLASES.map(c=>c.loc)).sort();
  $('dsel-loc').innerHTML=opt("","Selecciona localidad…")+l.map(x=>opt(x)).join(''); }
function onDashLoc(){ const loc=$('dsel-loc').value;
  const cols=uniq(CLASES.filter(c=>c.loc===loc).map(c=>c.col)).sort();
  const s=$('dsel-col'); s.innerHTML=opt("","Selecciona colegio…")+cols.map(c=>opt(c,shortCol(c))).join('');
  s.disabled=!loc; $('col-body').innerHTML=""; }
function renderColegio(){
  const col=$('dsel-col').value, loc=$('dsel-loc').value, body=$('col-body');
  if(!col){ body.innerHTML=""; return; }
  const aulas=CLASES.filter(c=>c.col===col && (!loc||c.loc===loc))
    .sort((a,b)=>String(a.aula||"").localeCompare(String(b.aula||""),'es',{numeric:true})||String(a.jor).localeCompare(String(b.jor)));
  let com=0,age=0,por=0; aulas.forEach(c=>c.ses.forEach(s=>{ s.e===2?com++:s.e===1?age++:por++; }));
  // encabezado del colegio: gestor(es) y contacto(s)
  const gestSet=uniq(aulas.map(c=>c.ges).filter(Boolean));
  const jorSet=uniq(aulas.map(c=>c.jor).filter(Boolean));
  const contactos=uniq(aulas.map(c=>[c.con,c.rol,c.cel].filter(Boolean).join(" · ")).filter(Boolean));
  const aulasTxt=uniq(aulas.map(c=>c.aula).filter(Boolean)).join(", ");
  let html=`<div class="card">
      <div class="schoolname">${shortCol(col)}</div>
      <div class="schoolsub">${loc||(aulas[0]&&aulas[0].loc)||""} · ${jorSet.join(", ")}</div>
      <div class="ginfo"><span>Gestor(es) AeR</span><b>${gestSet.join(" / ")||"—"}</b></div>
      <div class="ginfo"><span>Aulas</span><b>${aulasTxt||"—"} (${aulas.length})</b></div>
      ${contactos.map(ct=>`<div class="ginfo"><span>Contacto colegio</span><b>${ct}</b></div>`).join("")}
    </div>
    <div class="kpis">
      <div class="kpi c-com"><b>${com}</b><span>Completadas</span></div>
      <div class="kpi c-age"><b>${age}</b><span>Agendadas</span></div>
      <div class="kpi c-por"><b>${por}</b><span>Por agendar</span></div></div>
    <div class="card"><div class="dtitle">${aulas.length} aula(s) · detalle por sesión</div>`;
  aulas.forEach(c=>{ const done=c.ses.filter(s=>s.e===2).length; let cells='';
    c.ses.forEach((s,i)=>{ cells+=`<div class="cell e${s.e}"><div class="sn">S${i+1}</div><div class="dot"></div><div class="dt">${fmtCorta(s.f)}</div></div>`; });
    html+=`<div class="aula-card">
      <div class="aula-hd"><span class="nm">${aulaLabel(c)}</span><span class="pc">${done}/${NSES}</span></div>
      <div class="aula-sub">${c.jor||""} · Gestor(a): ${c.ges||"—"}</div>
      <div class="cells">${cells}</div></div>`; });
  html+=`</div>`;
  const late=[]; aulas.forEach(c=>c.ses.forEach((s,i)=>{ if(s.e===1&&s.f&&s.f<HOY) late.push({c,i,f:s.f}); }));
  html+=`<div class="alert"><div class="ah">⚠ Sesiones agendadas vencidas (${late.length})</div>`+
    (late.length? late.map(x=>`<div class="ai"><b>${aulaLabel(x.c)}</b> — Sesión ${x.i+1}, agendada ${fmtFecha(x.f)}</div>`).join('')
      : `<div class="none">Ninguna sesión agendada está vencida en este colegio.</div>`)+`</div>`;
  body.innerHTML=html;
}

/* ============ GENERAL ============ */
function renderGen(){
  const eq=$('gen-eq').value, gsel=$('gen-ges').value;
  let data = CLASES;
  if(eq)   data = data.filter(c=>teamLabel(c)===eq);
  if(gsel) data = data.filter(c=>c.ges===gsel);

  let com=0,age=0,por=0; data.forEach(c=>c.ses.forEach(s=>{ s.e===2?com++:s.e===1?age++:por++; }));
  $('k-com').textContent=com; $('k-age').textContent=age; $('k-por').textContent=por;

  // columnas = aulas presentes en la selección
  const aulas=uniq(data.map(c=>c.aula).filter(Boolean)).sort((a,b)=>a.localeCompare(b,'es',{numeric:true}));
  const ncols=aulas.length+1;
  // localidades ordenadas
  const locs=uniq(data.map(c=>c.loc)).sort((a,b)=>String(a).localeCompare(String(b),'es'));

  let h=`<thead><tr><th class="lcol">Colegio</th>`+
    aulas.map(a=>`<th>${a.replace(/Aula\s*/,'A')}</th>`).join('')+`</tr></thead><tbody>`;
  if(!data.length){ h+=`<tr><td colspan="${ncols}" style="padding:14px;color:var(--gris);">Sin colegios para este gestor.</td></tr>`; }
  locs.forEach(loc=>{
    const schools=uniq(data.filter(c=>c.loc===loc).map(c=>c.col))
      .sort((a,b)=>String(a).localeCompare(String(b),'es'));
    h+=`<tr class="locrow"><td colspan="${ncols}">${loc} · ${schools.length} colegio(s)</td></tr>`;
    schools.forEach(col=>{
      const scls=data.filter(c=>c.col===col)
        .sort((x,y)=>String(x.aula||"").localeCompare(String(y.aula||""),'es',{numeric:true}));
      const eq=uniq(scls.map(c=>c.ges).filter(Boolean)).join(" / ");
      const lines=scls.map(c=>{
        const ds=c.ses.map(s=> s.f
          ? `<span class="dd${s.e}">${s.f.slice(8,10)}/${s.f.slice(5,7)}</span>`
          : `<span class="dd0">–</span>`).join(" ");
        return `<div class="adates"><b>${String(c.aula||"").replace(/Aula\s*/,'A')}</b> ${ds}</div>`;
      }).join("");
      h+=`<tr><td class="lcol"><span class="cn">${shortCol(col)}</span><span class="eq">${eq||"—"}</span>${lines}</td>`;
      aulas.forEach(a=>{
        const cls=data.filter(c=>c.col===col && c.aula===a);
        if(!cls.length){ h+=`<td class="x">—</td>`; return; }
        const done=cls.reduce((t,c)=>t+c.ses.filter(x=>x.e===2).length,0);
        const tot=cls.length*NSES;
        const cl=done===tot?'m4':(done>0?'mp':'m0');
        h+=`<td class="${cl}">${done}/${tot}</td>`;
      });
      h+=`</tr>`;
    });
  });
  h+=`</tbody>`;
  $('gen-matrix').innerHTML=h;

  const late=[]; data.forEach(c=>c.ses.forEach((s,i)=>{ if(s.e===1&&s.f&&s.f<HOY) late.push({c,i,f:s.f}); }));
  $('gen-alert').innerHTML=`<div class="ah">⚠ Sesiones agendadas vencidas (${late.length})</div>`+
    (late.length? late.slice(0,40).map(x=>`<div class="ai"><b>${shortCol(x.c.col)}</b> · ${aulaLabel(x.c)} — Sesión ${x.i+1}, ${fmtFecha(x.f)}</div>`).join('')
      : `<div class="none">Ninguna sesión agendada está vencida.</div>`);
}

/* ============ tabs + toast ============ */
function setTab(t){
  $('view-reg').classList.toggle('hide',t!=='reg');
  $('view-col').classList.toggle('hide',t!=='col');
  $('view-gen').classList.toggle('hide',t!=='gen');
  $('tab-reg').classList.toggle('on',t==='reg');
  $('tab-col').classList.toggle('on',t==='col');
  $('tab-gen').classList.toggle('on',t==='gen');
  if(t==='col') renderColegio();
  if(t==='gen') renderGen();
}
let toTimer;
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(toTimer); toTimer=setTimeout(()=>t.classList.remove('show'),2600); }

/* ============ init ============ */
loadData();
</script>
</body>
</html>
